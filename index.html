<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i3d — Consultation Charges</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Josefin+Sans:wght@200;300;400;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #0d0f0c;
    --surface:      #141710;
    --card:         #191d15;
    --card-hover:   #1c2117;
    --border:       #252c1d;
    --border-soft:  #1d2318;
    --gold:         #c8a84b;
    --gold-dim:     #8a6f31;
    --green:        #4a7c3f;
    --green-bright: #5d9e50;
    --text:         #cac6ba;
    --text-dim:     #6a675c;
    --text-muted:   #3a3a32;
    --amber:        #d4870b;
    --white:        #e8e3d9;
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'Josefin Sans',sans-serif; font-weight:300; min-height:100vh; }

  /* ── HEADER ── */
  header {
    background:#0a0c09;
    border-bottom:1px solid var(--border);
    padding:22px 48px;
    display:flex;
    justify-content:space-between;
    align-items:center;
  }
  .logo-main { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:2.5rem; color:var(--gold); line-height:1; letter-spacing:-1.5px; }
  .logo-sub  { font-size:0.59rem; letter-spacing:0.4em; color:var(--text-dim); font-weight:400; margin-top:3px; }
  .logo-tag  { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.76rem; color:var(--gold-dim); margin-top:2px; }
  .hdr-right { text-align:right; font-size:0.75rem; color:var(--text-dim); line-height:1.8; }
  .hdr-right strong { display:block; font-size:0.9rem; color:var(--white); font-weight:600; letter-spacing:0.04em; margin-bottom:2px; }

  /* ── TOOLBAR ── */
  .toolbar {
    background:var(--surface);
    border-bottom:1px solid var(--border);
    padding:10px 48px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
  }
  .toolbar-l { display:flex; align-items:center; gap:14px; flex:1; min-width:0; }

  /* editable project badge */
  .project-badge-wrap { position:relative; display:inline-flex; align-items:center; }
  .project-badge {
    background:var(--green);
    color:#fff;
    font-size:0.67rem;
    font-weight:700;
    letter-spacing:0.14em;
    padding:5px 13px;
    border-radius:3px;
    cursor:pointer;
    transition:background .18s;
    white-space:nowrap;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .project-badge:hover { background:var(--green-bright); }
  .project-badge .edit-icon { font-size:0.65rem; opacity:0.7; }

  .badge-input {
    display:none;
    background:var(--surface);
    border:1px solid var(--green);
    color:var(--white);
    font-family:'Josefin Sans',sans-serif;
    font-size:0.67rem;
    font-weight:700;
    letter-spacing:0.14em;
    padding:5px 10px;
    border-radius:3px;
    outline:none;
    width:140px;
    text-transform:uppercase;
  }
  .badge-input.active { display:block; }
  .project-badge.hidden { display:none; }

  .toolbar-label { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.9rem; color:var(--text-dim); white-space:nowrap; }

  .btn { font-family:'Josefin Sans',sans-serif; font-size:0.67rem; font-weight:600; letter-spacing:0.1em; padding:8px 16px; border-radius:3px; border:none; cursor:pointer; display:inline-flex; align-items:center; gap:7px; transition:all .18s; }
  .btn-ghost  { background:transparent; color:var(--text-dim); border:1px solid var(--border); }
  .btn-ghost:hover { border-color:var(--text-dim); color:var(--text); }
  .btn-green  { background:var(--green); color:#fff; }
  .btn-green:hover { background:var(--green-bright); }

  /* ── MAIN ── */
  main { padding:36px 48px 72px; max-width:1340px; margin:0 auto; }

  /* ── SECTION CARD ── */
  .section-card { background:var(--card); border:1px solid var(--border); border-radius:6px; margin-bottom:16px; overflow:hidden; transition:border-color .2s; }
  .section-card:hover { border-color:#2e3624; }

  .sec-head { padding:22px 28px 18px; display:flex; align-items:flex-start; justify-content:space-between; cursor:pointer; user-select:none; transition:background .15s; }
  .sec-head:hover { background:var(--card-hover); }

  .sec-num { font-family:'Cormorant Garamond',serif; font-size:2.5rem; font-weight:300; color:var(--gold-dim); line-height:1; min-width:54px; flex-shrink:0; }
  .sec-info { flex:1; min-width:0; }

  /* ── TITLE LINE: editable inline ── */
  .title-line { display:flex; align-items:baseline; flex-wrap:wrap; gap:0; margin-bottom:0; }

  .sec-title-static {
    font-size:1.02rem;
    font-weight:600;
    color:var(--white);
    letter-spacing:0.03em;
    white-space:nowrap;
  }

  /* The "@ ___%" part — inline editable */
  .fee-inline-wrap {
    display:inline-flex;
    align-items:baseline;
    gap:2px;
    margin-left:6px;
    border-bottom:1px dashed var(--gold-dim);
    padding-bottom:1px;
    cursor:text;
    transition:border-color .2s;
  }
  .fee-inline-wrap:hover { border-color:var(--gold); }

  .fee-at { font-size:1.02rem; font-weight:600; color:var(--gold); }

  .fee-pct-input {
    background:transparent;
    border:none;
    outline:none;
    font-family:'Josefin Sans',sans-serif;
    font-size:1.02rem;
    font-weight:600;
    color:var(--gold);
    width:36px;
    text-align:center;
    padding:0 2px;
    letter-spacing:0.03em;
  }
  .fee-pct-suffix { font-size:1.02rem; font-weight:600; color:var(--gold); }

  /* subtitle — editable */
  .sec-subtitle {
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    color:var(--gold);
    font-size:0.88rem;
    margin-top:6px;
  }

  /* descriptor line — visit terms, editable */
  .sec-descriptor {
    margin-top:6px;
    display:flex;
    align-items:baseline;
    flex-wrap:wrap;
    gap:4px;
  }
  .desc-static {
    font-family:'DM Mono',monospace;
    font-size:0.64rem;
    color:var(--text-muted);
  }
  .visit-term-input {
    background:transparent;
    border:none;
    border-bottom:1px dashed var(--text-muted);
    outline:none;
    font-family:'DM Mono',monospace;
    font-size:0.64rem;
    color:var(--text-dim);
    padding:0 2px;
    width:240px;
    transition:border-color .2s, color .2s;
  }
  .visit-term-input:focus {
    border-color:var(--gold-dim);
    color:var(--text);
  }
  .visit-term-input::placeholder { color:var(--text-muted); font-style:italic; }

  /* status */
  .sec-head-right { display:flex; align-items:center; gap:12px; flex-shrink:0; margin-left:12px; }
  .status-badge { font-size:0.6rem; font-weight:700; letter-spacing:0.16em; padding:5px 11px; border-radius:3px; cursor:pointer; transition:all .18s; }
  .s-progress { background:rgba(74,124,63,0.18); color:var(--green-bright); border:1px solid var(--green); }
  .s-pending  { background:rgba(212,135,11,0.14); color:var(--amber); border:1px solid rgba(212,135,11,0.4); }
  .s-complete { background:rgba(180,180,180,0.06); color:var(--text-dim); border:1px solid var(--border); }
  .chevron { font-size:0.7rem; color:var(--text-muted); transition:transform .22s; flex-shrink:0; }
  .chevron.open { transform:rotate(180deg); }

  /* ── METRICS ── */
  .metrics { display:grid; grid-template-columns:repeat(4,1fr); border-top:1px solid var(--border); }
  .metric { padding:18px 26px; border-right:1px solid var(--border); }
  .metric:last-child { border-right:none; }
  .m-label { font-size:0.58rem; letter-spacing:0.22em; color:var(--text-muted); font-weight:600; margin-bottom:8px; }
  .m-val   { font-family:'Cormorant Garamond',serif; font-size:1.65rem; font-weight:600; line-height:1; }
  .mv-civil    { color:var(--text); }
  .mv-fee      { color:var(--gold); }
  .mv-received { color:var(--green-bright); }
  .mv-balance  { color:#d47a60; }
  .m-sub { font-family:'DM Mono',monospace; font-size:0.59rem; color:var(--amber); margin-top:5px; }

  /* ── EDIT PANEL ── */
  .edit-panel { display:none; background:rgba(0,0,0,0.3); border-top:1px solid var(--border-soft); padding:26px 28px 22px; }
  .edit-panel.open { display:block; }
  .ep-heading { font-size:0.59rem; letter-spacing:0.28em; color:var(--text-dim); font-weight:700; margin-bottom:18px; }

  .edit-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-bottom:16px; }
  .ef label { display:block; font-size:0.58rem; letter-spacing:0.2em; color:var(--text-muted); font-weight:600; margin-bottom:6px; }
  .ef input, .ef select, .ef textarea {
    width:100%; background:var(--surface); border:1px solid var(--border);
    color:var(--text); font-family:'DM Mono',monospace; font-size:0.82rem;
    padding:9px 12px; border-radius:3px; outline:none; transition:border-color .2s;
    -webkit-appearance:none; resize:none;
  }
  .ef input:focus, .ef select:focus, .ef textarea:focus { border-color:var(--gold-dim); }

  /* extra visits */
  .sv-row {
    display:flex; align-items:center; gap:14px; padding:13px 18px;
    background:rgba(212,135,11,0.04); border:1px solid rgba(212,135,11,0.16);
    border-radius:4px; margin-bottom:16px; flex-wrap:wrap;
  }
  .sv-row .sv-label { font-size:0.6rem; letter-spacing:0.18em; color:var(--amber); font-weight:600; flex-shrink:0; }
  .sv-row input { width:70px; background:var(--surface); border:1px solid var(--border); color:var(--text); font-family:'DM Mono',monospace; font-size:0.83rem; padding:7px 10px; border-radius:3px; outline:none; }
  .sv-row input:focus { border-color:var(--amber); }
  .sv-row .sv-note { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.78rem; color:var(--text-dim); flex:1; }
  .sv-row .sv-total { font-family:'DM Mono',monospace; font-size:0.74rem; color:var(--amber); flex-shrink:0; }

  .ep-actions { display:flex; gap:10px; justify-content:flex-end; }

  /* ── ADD SECTION ── */
  .add-section-btn {
    width:100%;
    padding:14px;
    background:transparent;
    border:1px dashed var(--border);
    border-radius:6px;
    color:var(--text-dim);
    font-family:'Josefin Sans',sans-serif;
    font-size:0.7rem;
    font-weight:600;
    letter-spacing:0.18em;
    cursor:pointer;
    transition:all .2s;
    margin-bottom:20px;
  }
  .add-section-btn:hover { border-color:var(--gold-dim); color:var(--gold-dim); background:rgba(200,168,75,0.03); }

  /* ── SUMMARY BAR ── */
  .summary-bar { display:flex; background:var(--surface); border:1px solid var(--border); border-radius:6px; overflow:hidden; margin-top:8px; }
  .sum-item { flex:1; padding:18px 26px; border-right:1px solid var(--border); }
  .sum-item:last-child { border-right:none; }
  .sum-label { font-size:0.57rem; letter-spacing:0.22em; color:var(--text-muted); font-weight:600; margin-bottom:6px; }
  .sum-val   { font-family:'Cormorant Garamond',serif; font-size:1.4rem; font-weight:600; color:var(--gold); }
  .sum-val.sv-rcv { color:var(--green-bright); }
  .sum-val.sv-bal { color:#d47a60; }

  /* print */
  @media print {
    .btn, .add-section-btn, .ep-actions, .edit-panel, .toolbar .btn-ghost { display:none !important; }
    .project-badge .edit-icon { display:none; }
    body { background:#fff; color:#111; }
    header { background:#fff; border-bottom:1px solid #ccc; }
    .logo-main { color:#8a6f31; }
    .sec-num { color:#c8a84b; }
    .m-val.mv-fee { color:#8a6f31; }
  }

  @media(max-width:860px){
    header, .toolbar, main { padding-left:16px; padding-right:16px; }
    .metrics { grid-template-columns:repeat(2,1fr); }
    .metric:nth-child(2){ border-right:none; }
    .metric:nth-child(3){ border-top:1px solid var(--border); border-right:1px solid var(--border); }
    .metric:nth-child(4){ border-top:1px solid var(--border); border-right:none; }
    .edit-grid { grid-template-columns:repeat(2,1fr); }
    .summary-bar { flex-wrap:wrap; }
    .sum-item { flex:1 1 40%; border:none; border-bottom:1px solid var(--border); }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div>
    <div class="logo-main">i3d</div>
    <div class="logo-sub">INTERACTIVE 3 DIMENSIONS</div>
    <div class="logo-tag">Architectural Visualisation &amp; Design Studio</div>
  </div>
  <div class="hdr-right">
    <strong>Shakhith A.M</strong>
    Architect, CA/97/21884<br>
    Ph: 9363113693<br>
    shakhith@gmail.com
  </div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="toolbar-l">
    <!-- editable client badge -->
    <div class="project-badge-wrap">
      <div class="project-badge" id="badge-label" onclick="startBadgeEdit()">
        <span id="badge-text">SNGC</span>
        <span class="edit-icon">✎</span>
      </div>
      <input class="badge-input" id="badge-input" type="text" value="SNGC"
        onblur="endBadgeEdit()" onkeydown="if(event.key==='Enter')endBadgeEdit()" maxlength="20" />
    </div>
    <div class="toolbar-label">Architectural Consultation Charges</div>
  </div>
  <div style="display:flex;gap:10px">
    <button class="btn btn-green" onclick="addSection()">+ ADD SECTION</button>
    <button class="btn btn-ghost" onclick="window.print()">⬒ PRINT / PDF</button>
  </div>
</div>

<!-- MAIN -->
<main id="app"></main>

<script>
// ══════════════════════════════════════════════
//  DATA MODEL
//  title       = editable inline (static part before "@")
//  feePct      = editable inline right in the title "@ ____%"
//  visitTerms  = free-text descriptor line (placeholder shown)
//  civilCost, received, extraVisits, visitRate = numeric fields
// ══════════════════════════════════════════════
let sections = [
  {
    id: 1,
    subtitle:    "Entrance Gateway — SNGC",
    status:      "IN PROGRESS",
    feePct:      4,
    civilCost:   1700000,
    received:    20000,
    visitTerms:  "1 site visit per week; additional visits at ₹3,000 per visit",
    extraVisits: 0,
    visitRate:   3000,
  },
  {
    id: 2,
    subtitle:    "Ladies Hostel → Classroom Conversion — SNGC",
    status:      "IN PROGRESS",
    feePct:      4,
    civilCost:   2200000,
    received:    35000,
    visitTerms:  "1 site visit per week; additional visits at ₹3,000 per visit",
    extraVisits: 0,
    visitRate:   3000,
  },
  {
    id: 3,
    subtitle:    "Admission Room & Classroom Refurbishing — SNGC",
    status:      "PENDING",
    feePct:      5,
    civilCost:   850000,
    received:    0,
    visitTerms:  "Visits at crucial stages of construction as mutually agreed",
    extraVisits: 0,
    visitRate:   3000,
  },
];

let nextId = 4;
const openPanels = new Set();

// ── helpers ───────────────────────────────────
function fmtINR(n) {
  const abs = Math.abs(Math.round(n));
  if (abs >= 100000) return '₹' + (abs / 100000).toFixed(2) + 'L';
  return '₹' + abs.toLocaleString('en-IN');
}
function calcFee(s) {
  const base  = Math.round(s.civilCost * s.feePct / 100);
  const extra = (s.extraVisits || 0) * (s.visitRate || 3000);
  return { base, extra, total: base + extra };
}
function statusCls(st) {
  if (st === 'IN PROGRESS') return 's-progress';
  if (st === 'PENDING')     return 's-pending';
  return 's-complete';
}
function statusCycle(idx) {
  const order = ['IN PROGRESS', 'PENDING', 'COMPLETE'];
  const cur = sections[idx].status;
  sections[idx].status = order[(order.indexOf(cur) + 1) % order.length];
  renderAll();
  syncOpen();
}
function totals() {
  let c=0, f=0, r=0;
  sections.forEach(s => { const {total}=calcFee(s); c+=s.civilCost; f+=total; r+=s.received; });
  return { c, f, r, b: f-r };
}
function syncOpen() {
  openPanels.forEach(i => {
    const p = document.getElementById(`ep-${i}`);
    const v = document.getElementById(`chv-${i}`);
    if (p) { p.classList.add('open'); v.classList.add('open'); }
  });
}

// ── project badge edit ────────────────────────
function startBadgeEdit() {
  document.getElementById('badge-label').classList.add('hidden');
  const inp = document.getElementById('badge-input');
  inp.classList.add('active');
  inp.focus(); inp.select();
}
function endBadgeEdit() {
  const inp = document.getElementById('badge-input');
  const val = inp.value.trim().toUpperCase() || 'CLIENT';
  inp.value = val;
  document.getElementById('badge-text').textContent = val;
  inp.classList.remove('active');
  document.getElementById('badge-label').classList.remove('hidden');
}

// ── toggle edit panel ──────────────────────────
function toggleEdit(idx) {
  const p = document.getElementById(`ep-${idx}`);
  const v = document.getElementById(`chv-${idx}`);
  if (openPanels.has(idx)) {
    openPanels.delete(idx);
    p.classList.remove('open');
    v.classList.remove('open');
  } else {
    openPanels.add(idx);
    p.classList.add('open');
    v.classList.add('open');
  }
}

// ── update field ───────────────────────────────
function update(idx, field, raw) {
  sections[idx][field] = (field === 'status' || field === 'visitTerms' || field === 'subtitle')
    ? raw
    : (parseFloat(raw) || 0);
  renderAll();
  syncOpen();
}

// ── add / remove section ───────────────────────
function addSection() {
  sections.push({
    id:          nextId++,
    subtitle:    "New Work Package",
    status:      "PENDING",
    feePct:      5,
    civilCost:   0,
    received:    0,
    visitTerms:  "",
    extraVisits: 0,
    visitRate:   3000,
  });
  renderAll();
  // auto-open new panel
  const newIdx = sections.length - 1;
  openPanels.add(newIdx);
  syncOpen();
  // scroll to it
  setTimeout(() => {
    const card = document.getElementById(`card-${newIdx}`);
    if (card) card.scrollIntoView({ behavior:'smooth', block:'nearest' });
  }, 50);
}
function removeSection(idx, e) {
  e.stopPropagation();
  if (sections.length === 1) return;
  sections.splice(idx, 1);
  openPanels.clear();
  renderAll();
}

// ── render ─────────────────────────────────────
function renderAll() {
  const app = document.getElementById('app');
  app.innerHTML = '';

  sections.forEach((s, idx) => {
    const { base, extra, total } = calcFee(s);
    const balance = total - s.received;
    const isOpen  = openPanels.has(idx);

    const card = document.createElement('div');
    card.className = 'section-card';
    card.id = `card-${idx}`;

    card.innerHTML = `
      <!-- ── SECTION HEADER ── -->
      <div class="sec-head" onclick="toggleEdit(${idx})">
        <div class="sec-num">0${idx + 1}</div>
        <div class="sec-info">

          <!-- Title + inline % -->
          <div class="title-line">
            <span class="sec-title-static">Architectural Consultation Charges</span>
            <span class="fee-inline-wrap" onclick="event.stopPropagation()">
              <span class="fee-at">&nbsp;@&nbsp;</span>
              <input class="fee-pct-input" type="number" min="1" max="20" step="0.5"
                value="${s.feePct}"
                title="Edit consultation fee %"
                onchange="update(${idx},'feePct',this.value)"
                onclick="event.stopPropagation()" />
              <span class="fee-pct-suffix">%</span>
            </span>
          </div>

          <!-- Subtitle — editable in panel -->
          <div class="sec-subtitle">${s.subtitle}</div>

          <!-- Visit terms descriptor -->
          <div class="sec-descriptor">
            <span class="desc-static">Site supervision —</span>
            <input class="visit-term-input"
              type="text"
              value="${escHtml(s.visitTerms)}"
              placeholder="e.g. 1 visit/week · at crucial stages · as mutually agreed"
              onclick="event.stopPropagation()"
              onchange="update(${idx},'visitTerms',this.value)"
              onblur="update(${idx},'visitTerms',this.value)" />
          </div>
        </div>

        <div class="sec-head-right">
          <span class="status-badge ${statusCls(s.status)}"
            onclick="event.stopPropagation(); statusCycle(${idx})"
            title="Click to cycle status">${s.status}</span>
          <span class="chevron${isOpen?' open':''}" id="chv-${idx}">▾</span>
        </div>
      </div>

      <!-- ── METRICS ── -->
      <div class="metrics">
        <div class="metric">
          <div class="m-label">CIVIL COST</div>
          <div class="m-val mv-civil">${fmtINR(s.civilCost)}</div>
        </div>
        <div class="metric">
          <div class="m-label">FEE @ ${s.feePct}%</div>
          <div class="m-val mv-fee">
            ${fmtINR(base)}
            ${extra > 0 ? `<span style="font-size:.85rem;color:var(--amber)"> +${fmtINR(extra)}</span>` : ''}
          </div>
          ${extra > 0 ? `<div class="m-sub">${s.extraVisits} extra visit${s.extraVisits>1?'s':''} × ₹${(s.visitRate||3000).toLocaleString('en-IN')}</div>` : ''}
        </div>
        <div class="metric">
          <div class="m-label">RECEIVED</div>
          <div class="m-val mv-received">${fmtINR(s.received)}</div>
        </div>
        <div class="metric">
          <div class="m-label">BALANCE</div>
          <div class="m-val mv-balance">${fmtINR(balance)}</div>
        </div>
      </div>

      <!-- ── EDIT PANEL ── -->
      <div class="edit-panel${isOpen?' open':''}" id="ep-${idx}">
        <div class="ep-heading">FINANCIALS — SECTION ${idx+1}</div>

        <div class="edit-grid">
          <div class="ef" style="grid-column:1/-1">
            <label>WORK PACKAGE / SCOPE DESCRIPTION</label>
            <input type="text" value="${escHtml(s.subtitle)}"
              onchange="update(${idx},'subtitle',this.value)" />
          </div>
          <div class="ef">
            <label>CIVIL / PROJECT COST (₹)</label>
            <input type="number" value="${s.civilCost}"
              onchange="update(${idx},'civilCost',this.value)" />
          </div>
          <div class="ef">
            <label>AMOUNT RECEIVED (₹)</label>
            <input type="number" value="${s.received}"
              onchange="update(${idx},'received',this.value)" />
          </div>
          <div class="ef">
            <label>RATE PER EXTRA VISIT (₹)</label>
            <input type="number" value="${s.visitRate||3000}"
              onchange="update(${idx},'visitRate',this.value)" />
          </div>
        </div>

        <!-- Extra visits -->
        <div class="sv-row">
          <span class="sv-label">EXTRA VISITS THIS CYCLE</span>
          <input type="number" min="0" step="1" value="${s.extraVisits||0}"
            onchange="update(${idx},'extraVisits',this.value)" />
          <span class="sv-note">Visits beyond the agreed schedule, billed at ₹${(s.visitRate||3000).toLocaleString('en-IN')} per visit.</span>
          ${(s.extraVisits||0) > 0 ? `<span class="sv-total">+ ${fmtINR((s.extraVisits||0)*(s.visitRate||3000))}</span>` : ''}
        </div>

        <div class="ep-actions">
          ${sections.length > 1
            ? `<button class="btn btn-ghost" style="color:#c0523b;border-color:rgba(192,82,59,0.3)"
                onclick="removeSection(${idx},event)">✕ REMOVE</button>`
            : ''}
          <button class="btn btn-ghost" onclick="toggleEdit(${idx})">CLOSE</button>
        </div>
      </div>
    `;
    app.appendChild(card);
  });

  // Add section button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-section-btn';
  addBtn.textContent = '+ ADD WORK PACKAGE';
  addBtn.onclick = addSection;
  app.appendChild(addBtn);

  // Summary
  const { c, f, r, b } = totals();
  const bar = document.createElement('div');
  bar.className = 'summary-bar';
  bar.innerHTML = `
    <div class="sum-item"><div class="sum-label">TOTAL PROJECT COST</div><div class="sum-val">${fmtINR(c)}</div></div>
    <div class="sum-item"><div class="sum-label">TOTAL CONSULTATION FEE</div><div class="sum-val">${fmtINR(f)}</div></div>
    <div class="sum-item"><div class="sum-label">TOTAL RECEIVED</div><div class="sum-val sv-rcv">${fmtINR(r)}</div></div>
    <div class="sum-item"><div class="sum-label">TOTAL OUTSTANDING</div><div class="sum-val sv-bal">${fmtINR(b)}</div></div>
  `;
  app.appendChild(bar);
}

function escHtml(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/"/g,'&quot;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;');
}

renderAll();
</script>
</body>
</html>
