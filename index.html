<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>i3d — Architectural Supervision Charges</title>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#111;--surface:#181818;--surface2:#202020;--surface3:#282828;
  --border:#2e2e2e;--border2:#383838;
  --gold:#c9a84c;--gold-l:#e8c96a;--gold-d:#7a6430;--gold-bg:#1a1400;
  --green:#2d5a27;--green-l:#4a8f42;--green-dim:#1a3317;
  --text:#e4e4e4;--text-dim:#888;--text-muted:#4a4a4a;
  --red:#c0392b;--amber:#d4880a;--blue:#3d6eb5;
  --row-received-bg:#162b12;--row-received-txt:#6abf5e;--row-received-bdr:#2d5a2750;
  --row-due-bg:#2a0f0f;--row-due-txt:#e07878;--row-due-bdr:#8b000050;
  --row-next-bg:#1e1900;--row-next-txt:#c9a030;--row-next-bdr:#80700050;
  --row-pending-bg:#1a1a1a;--row-pending-txt:#555;--row-pending-bdr:#33333330;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'EB Garamond',Georgia,serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}

/* LETTERHEAD */
.letterhead{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 32px 16px;background:var(--surface);border-bottom:1px solid var(--border2)}
.lh-logo{font-family:'Crimson Pro',Georgia,serif;font-style:italic;font-size:42px;font-weight:600;color:#2d5a27;line-height:1}
.lh-tagline{font-size:12px;letter-spacing:2.5px;text-transform:uppercase;color:#5a8a54;margin-top:3px}
.lh-studio{font-size:11px;color:#5a8a54;font-style:italic;margin-top:2px}
.lh-rule{width:100%;height:1px;background:linear-gradient(90deg,#2d5a27,transparent);margin:8px 0 0}
.lh-right{text-align:right;font-size:12px;color:var(--text-dim);line-height:1.8}
.lh-right strong{display:block;font-size:13px;color:var(--text)}

/* NAV */
.project-nav{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;overflow-x:auto}
.pnav-tab{padding:13px 18px;font-size:12px;font-weight:600;letter-spacing:.5px;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;display:flex;align-items:center;gap:6px}
.pnav-tab:hover{color:var(--text-dim)}
.pnav-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.tab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:background .3s;background:transparent}
.tab-dot.dot-due{background:#e07878}
.tab-dot.dot-ok{background:#4a8f42}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:9px 32px;background:var(--surface2);border-bottom:1px solid var(--border)}
.project-badge{font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;background:var(--green-dim);color:var(--green-l);padding:4px 10px;border-radius:3px;border:1px solid #2d5a2744}
.btn{padding:7px 15px;border-radius:4px;border:none;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;transition:all .2s;font-family:inherit}
.btn-gold{background:var(--gold);color:#111}.btn-gold:hover{background:var(--gold-l)}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text-dim)}.btn-outline:hover{border-color:var(--gold);color:var(--gold)}
.btn-green{background:#1a3317;border:1px solid #2d5a2766;color:var(--green-l)}.btn-green:hover{background:#2d5a27;color:#fff}
.btn-red{background:#2a0f0f;border:1px solid #6b000066;color:#e07878}.btn-red:hover{background:#3a1515}

/* MAIN */
.main{padding:22px 32px;max-width:1200px;margin:0 auto}
.panel{display:none}.panel.active{display:block}

/* SECTION */
.section{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:18px;overflow:hidden}
.section-head{padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2)}
.section-title{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
.section-body{padding:16px}

/* PROJECT HEADER */
.project-header{background:var(--surface);border:1px solid var(--border);border-radius:6px;margin-bottom:18px;overflow:hidden;border-top:3px solid var(--gold-d)}
.ph-head{padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between}
.ph-number{font-family:'Crimson Pro',Georgia,serif;font-size:34px;font-style:italic;color:var(--gold-d);font-weight:600;line-height:1;margin-right:14px;padding-right:14px;border-right:1px solid var(--border)}
.ph-title{font-size:18px;font-weight:600;color:var(--text);line-height:1.3}
.ph-subtitle{color:var(--gold);font-size:15px;margin-top:2px}
.ph-sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.ph-body{padding:14px 20px}

/* COST CARDS */
.cost-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.cost-card{background:var(--surface2);border:1px solid var(--border);border-radius:5px;padding:11px 13px}
.cc-label{font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim);margin-bottom:5px}
.cc-value{font-size:20px;font-weight:700;color:var(--gold);font-family:'EB Garamond',Georgia,serif}
.cc-value.green{color:var(--green-l)}.cc-value.amber{color:var(--amber)}
.cc-sub{font-size:10px;color:var(--text-muted);margin-top:2px}

/* TABLES */
table{width:100%;border-collapse:collapse;font-size:13px}
th{padding:8px 11px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text-dim);border-bottom:1px solid var(--border);background:var(--surface2)}
td{padding:9px 11px;border-bottom:1px solid #1d1d1d;vertical-align:middle}
tr:last-child td{border-bottom:none}
.tfoot-row td{background:var(--surface3);font-weight:700;color:var(--gold);border-top:1px solid var(--border)}
.td-gold{color:var(--gold);font-weight:600}.td-dim{color:var(--text-dim)}
.td-right{text-align:right}

/* ROW COLOURS */
.rr-received td{background:var(--row-received-bg)!important;color:var(--row-received-txt)!important;border-bottom:1px solid var(--row-received-bdr)!important}
.rr-due td{background:var(--row-due-bg)!important;color:var(--row-due-txt)!important;border-bottom:1px solid var(--row-due-bdr)!important}
.rr-next td{background:var(--row-next-bg)!important;color:var(--row-next-txt)!important;border-bottom:1px solid var(--row-next-bdr)!important}
.rr-pending td{background:var(--row-pending-bg)!important;color:var(--row-pending-txt)!important;border-bottom:1px solid var(--row-pending-bdr)!important}

/* PILLS */
.pill{display:inline-flex;align-items:center;padding:3px 9px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase}
.pill-received{background:var(--row-received-bg);color:var(--row-received-txt);border:1px solid var(--row-received-bdr)}
.pill-pending{background:#1a1a00;color:#b8a020;border:1px solid #6b590033}
.pill-due{background:var(--row-due-bg);color:var(--row-due-txt);border:1px solid var(--row-due-bdr)}

/* INFO BOXES */
.info-box{background:var(--surface2);border-left:3px solid var(--gold);border-radius:0 4px 4px 0;padding:9px 13px;margin-top:12px;font-size:12px;color:var(--text-dim);line-height:1.7}
.warn-box{background:var(--gold-bg);border-left:3px solid var(--gold-d);border-radius:0 4px 4px 0;padding:9px 13px;font-size:12px;color:#a88030;line-height:1.7}
.excl-list{list-style:none;padding:0}
.excl-list li{padding:5px 0 5px 16px;position:relative;color:var(--text-dim);font-size:12px;border-bottom:1px solid #1d1d1d}
.excl-list li:before{content:'—';position:absolute;left:0;color:var(--gold-d)}
.excl-list li:last-child{border-bottom:none}

/* GRID */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* INLINE INPUTS (receipt tracker) */
.ri{background:var(--surface2);border:1px solid var(--border);border-radius:3px;color:var(--text);padding:4px 7px;font-size:11px;outline:none}
.ri:focus{border-color:var(--gold)}
select.ri{cursor:pointer}

/* OVERVIEW */
.overview-hero{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:22px;margin-bottom:18px;border-top:3px solid var(--green);display:flex;align-items:flex-start;justify-content:space-between;gap:20px}
.oh-name{font-size:22px;font-weight:600}
.oh-sub{font-size:11px;color:var(--text-dim);margin-top:3px}
.oh-total{font-size:32px;font-weight:600;color:var(--gold);font-family:'EB Garamond',Georgia,serif}
.oh-total-label{font-size:10px;letter-spacing:.8px;text-transform:uppercase;color:var(--text-dim)}
.overview-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:18px}
.ov-card{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:13px;cursor:pointer;transition:border-color .2s}
.ov-card:hover{border-color:var(--gold)}
.ov-num{font-family:'Crimson Pro',Georgia,serif;font-size:20px;font-style:italic;color:var(--gold-d);font-weight:600}
.ov-title{font-size:11px;color:var(--text);font-weight:600;margin-top:4px;line-height:1.3;min-height:28px}
.ov-fee{font-size:16px;font-weight:700;color:var(--gold);margin-top:5px}
.ov-bar-wrap{margin-top:7px;height:4px;background:var(--surface3);border-radius:2px;overflow:hidden}
.ov-bar{height:100%;border-radius:2px;transition:width .5s}
.progress-wrap{height:5px;background:var(--surface3);border-radius:3px;overflow:hidden;margin-top:4px}
.progress-bar{height:100%;background:var(--gold);border-radius:3px}

/* ═══════════════════════════════════════
   EDIT MODAL
═══════════════════════════════════════ */
.modal-overlay{display:none;position:fixed;inset:0;background:#000000cc;z-index:1000;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:8px;width:100%;max-width:680px;overflow:hidden;border-top:3px solid var(--gold)}
.modal-head{padding:14px 20px;background:var(--surface2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--gold)}
.modal-close{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:0 4px;line-height:1}.modal-close:hover{color:var(--text)}
.modal-body{padding:20px}
.mfield{display:flex;flex-direction:column;gap:4px;margin-bottom:14px}
.mfield label{font-size:10px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-dim)}
.mfield input,.mfield select{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px 10px;font-size:13px;font-family:inherit;outline:none;transition:border .2s;width:100%}
.mfield input:focus,.mfield select:focus{border-color:var(--gold)}
.mgrid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mgrid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.modal-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.stage-edit-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:center;margin-bottom:8px}
.stage-edit-row input{background:var(--surface2);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:7px 10px;font-size:12px;font-family:inherit;outline:none}
.stage-edit-row input:focus{border-color:var(--gold)}
.stage-label{font-size:10px;color:var(--text-dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.btn-add-stage{background:var(--surface2);border:1px solid var(--border);color:var(--text-dim);border-radius:4px;padding:7px 14px;cursor:pointer;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;width:100%;margin-top:4px;transition:all .2s}
.btn-add-stage:hover{border-color:var(--gold);color:var(--gold)}
.btn-remove-stage{background:none;border:1px solid #2a0f0f;color:#e07878;border-radius:4px;padding:6px 10px;cursor:pointer;font-size:11px;transition:all .2s}
.btn-remove-stage:hover{background:#2a0f0f}
.modal-foot{padding:14px 20px;background:var(--surface2);border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.calc-preview{background:var(--gold-bg);border:1px solid var(--gold-d);border-radius:4px;padding:9px 13px;font-size:12px;color:var(--gold);margin-top:8px}
</style>
</head>
<body>

<!-- LETTERHEAD -->
<div class="letterhead">
  <div>
    <div class="lh-logo">i3d</div>
    <div class="lh-tagline">Interactive 3 Dimensions</div>
    <div class="lh-studio">Architectural Visualisation &amp; Design Studio</div>
    <div class="lh-rule"></div>
  </div>
  <div class="lh-right">
    <strong>Shakhith A.M</strong>
    Architect, CA/97/21884<br/>Ph: 9363113693<br/>shakhith@gmail.com
  </div>
</div>

<!-- NAV -->
<div class="project-nav" id="project-nav"></div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div style="display:flex;align-items:center;gap:10px">
    <div class="project-badge" id="toolbar-badge">Loading…</div>
    <div style="font-size:11px;color:var(--text-muted)">Architectural Supervision Charges</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-green" onclick="openEditModal()">✎ Edit Project</button>
    <div style="position:relative;display:inline-block" id="print-menu-wrap">
      <button class="btn btn-outline" onclick="togglePrintMenu()" id="print-btn">⎙ Print / PDF ▾</button>
      <div id="print-menu" style="display:none;position:absolute;right:0;top:calc(100% + 4px);background:var(--surface);border:1px solid var(--border2);border-radius:4px;min-width:180px;z-index:200;overflow:hidden;box-shadow:0 4px 16px #00000066">
        <div onclick="printCurrent()" style="padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">⎙ Print Current Tab</div>
        <div style="height:1px;background:var(--border)"></div>
        <div onclick="printAll()" style="padding:10px 16px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--text-dim);cursor:pointer;transition:background .15s" onmouseover="this.style.background='var(--surface2)'" onmouseout="this.style.background='transparent'">⎙ Print All Projects</div>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main" id="main-content"></div>

<!-- ═══════════ EDIT MODAL ═══════════ -->
<div class="modal-overlay" id="edit-modal">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">Edit Project</div>
      <button class="modal-close" onclick="closeEditModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="mgrid-2">
        <div class="mfield"><label>Project Title</label><input id="ed-title" placeholder="e.g. Library Renovation"/></div>
        <div class="mfield"><label>Client / Organisation</label><input id="ed-client" placeholder="e.g. SNGC"/></div>
      </div>
      <div class="mgrid-3">
        <div class="mfield"><label>Civil Cost (₹)</label><input type="number" id="ed-civil" placeholder="e.g. 1700000" oninput="previewFee()"/></div>
        <div class="mfield"><label>Fee Rate (%)</label><input type="number" id="ed-rate" value="5" min="1" max="20" step="0.5" oninput="previewFee()"/></div>
        <div class="mfield"><label>Rounded Total Fee (₹)</label><input type="number" id="ed-fee" placeholder="Auto-calculated"/></div>
      </div>
      <div class="calc-preview" id="ed-preview">Enter civil cost and rate to calculate fee.</div>
      <div class="mfield" style="margin-top:14px"><label>Scope / Sub-title</label><input id="ed-scope" placeholder="e.g. Consultation + Supervision (5%)"/></div>

      <hr class="modal-divider"/>
      <div class="stage-label">Payment Stages</div>
      <div id="ed-stages-wrap"></div>
      <button class="btn-add-stage" onclick="addStageRow()">+ Add Stage</button>

      <hr class="modal-divider"/>
      <div class="mfield" style="margin-bottom:0">
        <label>Notes / Additional Info</label>
        <input id="ed-notes" placeholder="Optional notes shown below project header"/>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
      <button class="btn btn-gold" onclick="saveProject()">✓ Save &amp; Update</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════
// DATA — all projects, fully editable
// ═══════════════════════════════════════════════
const DEFAULT_PROJECTS = [
  {
    id:'p1', num:'01', client:'SNGC',
    title:'Entrance Gateway',
    scope:'Consultation + Supervision (5% of Projected Estimate Cost)',
    civil:1700000, rate:5, fee:85000,
    notes:'',
    stages:[
      {name:'Mobilization Advance', amt:20000, hardReceived:true, date:'2025-12-30', status:'received'},
      {name:'Design Completion',    amt:30000, hardReceived:false, date:'', status:'pending'},
      {name:'Foundation Complete',  amt:20000, hardReceived:false, date:'', status:'pending'},
      {name:'Structure Complete',   amt:15000, hardReceived:false, date:'', status:'pending'},
    ],
    stageRemarks:['Upon agreement signing','Upon approval of drawings & BOQ','Post-foundation inspection','Post-superstructure completion'],
  },
  {
    id:'p2', num:'02', client:'SNGC',
    title:'Ladies Hostel → Classroom Conversion',
    scope:'Consultation + Supervision (5% of Projected Estimate Cost)',
    civil:8135000, rate:5, fee:400000,
    notes:'',
    stages:[
      {name:'Mobilization Advance', amt:96000, hardReceived:true,  date:'2026-02-16', status:'received'},
      {name:'Design Completion',    amt:80000, hardReceived:false, date:'', status:'pending'},
      {name:'Foundation Complete',  amt:80000, hardReceived:false, date:'', status:'pending'},
      {name:'Structure Complete',   amt:80000, hardReceived:false, date:'', status:'pending'},
      {name:'Finishing Complete',   amt:40000, hardReceived:false, date:'', status:'pending'},
      {name:'Final Handover',       amt:24000, hardReceived:false, date:'', status:'pending'},
    ],
    stageRemarks:['Upon agreement signing','Upon approval of drawings & BOQ','Post-foundation inspection','Post-superstructure completion','Post-finishing works','Upon project completion'],
  },
  {
    id:'p3', num:'03', client:'SNGC',
    title:'Admission Room & Classroom Refurbishing',
    scope:'Consultation + Supervision (5%) · Counselling Room + Classroom',
    civil:700000, rate:5, fee:35000,
    notes:'Counselling Room ₹3,50,000 + Single Classroom ₹3,50,000',
    stages:[
      {name:'Design Completion',   amt:17500, hardReceived:false, date:'', status:'pending'},
      {name:'Finishing Complete',  amt:17500, hardReceived:false, date:'', status:'pending'},
    ],
    stageRemarks:['Upon approval of drawings & BOQ','Post-finishing works'],
  },
  {
    id:'p4', num:'04', client:'SNGC',
    title:'Landscaping Design',
    scope:'Consultation + Supervision (5%) + 3D Visualisation Charges',
    civil:750000, rate:5, fee:50000,
    notes:'Supervision ₹37,500 + 3D Viz ₹15,000 = ₹52,500 → Rounded ₹50,000',
    stages:[
      {name:'3D Viz & Design Charges', amt:20000, hardReceived:false, date:'', status:'pending'},
      {name:'Design Completion',       amt:30000, hardReceived:false, date:'', status:'pending'},
    ],
    stageRemarks:['Upon design finalisation','Upon work completion'],
  },
  {
    id:'p5', num:'05', client:'SNGC',
    title:'Staff Toilet Refurbishing',
    scope:'Consultation + Supervision (5%) · Gents & Ladies',
    civil:700000, rate:5, fee:35000,
    notes:'Gents Toilet ₹3,50,000 + Ladies Toilet ₹3,50,000',
    stages:[
      {name:'Mobilization Advance', amt:17500, hardReceived:false, date:'', status:'pending'},
      {name:'Design Completion',    amt:17500, hardReceived:false, date:'', status:'pending'},
    ],
    stageRemarks:['Upon design finalisation','Upon work completion'],
  },
];

// Load from localStorage or use defaults
let PROJECTS = loadProjects();
let currentPid = 'overview';

function loadProjects(){
  try{
    const s = localStorage.getItem('i3d_sngc_projects');
    if(s) return JSON.parse(s);
  } catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_PROJECTS));
}

function saveProjects(){
  try{ localStorage.setItem('i3d_sngc_projects', JSON.stringify(PROJECTS)); } catch(e){}
}

// ═══════════════════════════════════════════════
// RENDER ENGINE — all HTML generated from data
// ═══════════════════════════════════════════════
function renderAll(){
  renderNav();
  renderMain();
  updateOverviewCards();
  PROJECTS.forEach(p => applyRowColours(p.id));
}

function renderNav(){
  const nav = document.getElementById('project-nav');
  nav.innerHTML = `<div class="pnav-tab ${currentPid==='overview'?'active':''}" onclick="switchPanel('overview',this)">Overview</div>`
    + PROJECTS.map((p,i)=>`<div class="pnav-tab ${currentPid===p.id?'active':''}" id="tab-${p.id}" onclick="switchPanel('${p.id}',this)">${p.num}. ${p.title}<span class="tab-dot" id="dot-${p.id}"></span></div>`).join('');
}

function renderMain(){
  const main = document.getElementById('main-content');
  let html = renderOverview() + PROJECTS.map(p => renderProject(p)).join('');
  main.innerHTML = html;
}

function renderOverview(){
  const totalFee = PROJECTS.reduce((a,p)=>a+p.fee,0);

    if(s.hardReceived){
      return `<tr id="tr-${rid}" data-hardreceived="1" class="rr-received">
        <td class="td-gold">${i+1}</td>
        <td>${s.date ? new Date(s.date).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}) : ''}</td>

    return `<tr id="tr-${rid}">

            <div class="ph-sub">${p.scope}</div>
          </div>
        </div>
        <div><span class="pill ${recd===0?'pill-pending':recd>=p.fee?'pill-received':'pill-pending'}">${recd>=p.fee?'Complete':recd>0?'In Progress':'Pending'}</span></div>
      </div>
      <div class="ph-body">
        <div class="cost-cards">
          <div class="cost-card"><div class="cc-label">Civil Cost</div><div class="cc-value">${fmtINR(p.civil)}</div></div>
          <div class="cost-card"><div class="cc-label">Fee @ ${p.rate}%</div><div class="cc-value">${fmtINR(p.fee)}</div>${p.notes?`<div class="cc-sub" style="font-size:9px;line-height:1.4">${p.notes}</div>`:''}</div>

          <div class="cost-card"><div class="cc-label">Balance</div><div class="cc-value amber" id="${p.id}-balance">${fmtINR(bal)}</div></div>
        </div>

    <div class="grid-2">
      <div class="section">
        <div class="section-head"><div class="section-title">Payment Schedule</div></div>

            <tbody>${schedRows}</tbody>

// STATE & UPDATES
// ═══════════════════════════════════════════════
function received(p){
  return p.stages.reduce((a,s)=> a + (s.status==='received'||s.hardReceived ? s.amt : 0), 0);
}

function stageFieldChange(pid, idx, field, val){
  const p = PROJECTS.find(x=>x.id===pid);
  p.stages[idx][field] = val;
  if(field==='status') updateReceipts(pid);
  saveProjects();
}

function updateReceipts(pid){
  const p = PROJECTS.find(x=>x.id===pid);
  const recd = received(p);
  const bal = p.fee - recd;
  const rEl = document.getElementById(p.id+'-received-total');
  const bEl = document.getElementById(p.id+'-balance');
  if(rEl) rEl.textContent = fmtINR(recd);
  if(bEl) bEl.textContent = fmtINR(bal);
  applyRowColours(pid);
  updateOverviewCards();
}

function applyRowColours(pid){
  const p = PROJECTS.find(x=>x.id===pid);
  if(!p) return;
  let firstPendingDone = false;
  p.stages.forEach((s,i)=>{
    const rid = `${pid}-r${i}`;
    const tr = document.getElementById('tr-'+rid);
    if(!tr) return;
    tr.classList.remove('rr-received','rr-due','rr-next','rr-pending');
    if(s.hardReceived || s.status==='received'){
      tr.classList.add('rr-received');
    } else if(s.status==='due'){
      tr.classList.add('rr-due');
    } else {
      if(!firstPendingDone){ tr.classList.add('rr-next'); firstPendingDone=true; }
      else tr.classList.add('rr-pending');
    }
  });
  updateTabDot(pid);
}

function updateTabDot(pid){
  const dot = document.getElementById('dot-'+pid);
  if(!dot) return;
  const p = PROJECTS.find(x=>x.id===pid);
  const hasDue = p.stages.some(s=>s.status==='due');
  const allDone = received(p)>=p.fee;
  dot.className = 'tab-dot';
  if(hasDue) dot.classList.add('dot-due');
  else if(allDone) dot.classList.add('dot-ok');
}

function updateOverviewCards(){
  const totalRecd = PROJECTS.reduce((a,p)=>a+received(p),0);
  const totalFee  = PROJECTS.reduce((a,p)=>a+p.fee,0);
  const collEl = document.getElementById('ov-collected');
  if(collEl) collEl.textContent = fmtINR(totalRecd)+' collected';

  PROJECTS.forEach((p,i)=>{
    const recd = received(p);
    const pct = p.fee>0 ? Math.round(recd/p.fee*100) : 0;
    const stEl  = document.getElementById('ov-'+p.id+'-status');
    const barEl = document.getElementById('ov-'+p.id+'-bar');
    if(stEl) stEl.innerHTML = `<span style="color:var(--text-dim)">Collected:</span> <span style="color:var(--row-received-txt);font-weight:700">${fmtINR(recd)}</span> <span style="color:var(--text-muted)">(${pct}%)</span>`;
    if(barEl){ barEl.style.width=pct+'%'; barEl.style.background=pct>=100?'var(--green-l)':pct>0?'var(--gold)':'var(--text-muted)'; }
  });
}

function switchPanel(id, el){
  currentPid = id;
  document.querySelectorAll('.pnav-tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  if(el) el.classList.add('active');
  const panel = document.getElementById('panel-'+id);
  if(panel) panel.classList.add('active');
  // update toolbar badge
  if(id==='overview'){
    document.getElementById('toolbar-badge').textContent = PROJECTS[0]?.client || 'Overview';
  } else {
    const p = PROJECTS.find(x=>x.id===id);
    document.getElementById('toolbar-badge').textContent = p ? p.client||p.title : '';
  }
}

let editingPid = null;

function openEditModal(){
  const pid = currentPid==='overview' ? PROJECTS[0].id : currentPid;
  editingPid = pid;
  const p = PROJECTS.find(x=>x.id===pid);
  document.getElementById('ed-title').value  = p.title;
  document.getElementById('ed-client').value = p.client||'';
  document.getElementById('ed-civil').value  = p.civil;
  document.getElementById('ed-rate').value   = p.rate;
  document.getElementById('ed-fee').value    = p.fee;
  document.getElementById('ed-scope').value  = p.scope;
  document.getElementById('ed-notes').value  = p.notes||'';
  renderStageEditors(p);
  previewFee();
  document.getElementById('edit-modal').classList.add('open');
}

function closeEditModal(){
  document.getElementById('edit-modal').classList.remove('open');
  editingPid = null;
}

function renderStageEditors(p){
  const wrap = document.getElementById('ed-stages-wrap');
  wrap.innerHTML = p.stages.map((s,i)=>`
    <div class="stage-edit-row" id="sed-row-${i}">
      <input placeholder="Stage name" value="${s.name}" oninput="edStageField(${i},'name',this.value)"/>
      <input type="number" placeholder="Amount ₹" value="${s.amt}" oninput="edStageField(${i},'amt',this.value)"/>
      <button class="btn-remove-stage" onclick="removeStageRow(${i})">✕</button>
    </div>`).join('');
}

let edStages = [];
function openEditModal(){
  const pid = currentPid==='overview' ? PROJECTS[0].id : currentPid;
  editingPid = pid;
  const p = PROJECTS.find(x=>x.id===pid);
  // deep copy stages for editing
  edStages = p.stages.map(s=>({...s}));
  document.getElementById('ed-title').value  = p.title;
  document.getElementById('ed-client').value = p.client||'';
  document.getElementById('ed-civil').value  = p.civil;
  document.getElementById('ed-rate').value   = p.rate;
  document.getElementById('ed-fee').value    = p.fee;
  document.getElementById('ed-scope').value  = p.scope;
  document.getElementById('ed-notes').value  = p.notes||'';
  renderModalStages();
  previewFee();
  document.getElementById('edit-modal').classList.add('open');
}

function renderModalStages(){
  const wrap = document.getElementById('ed-stages-wrap');
  wrap.innerHTML = edStages.map((s,i)=>`
    <div class="stage-edit-row">
      <input placeholder="Stage name" value="${escHtml(s.name)}" oninput="edStages[${i}].name=this.value"/>
      <input type="number" placeholder="Amount ₹" value="${s.amt}" oninput="edStages[${i}].amt=parseFloat(this.value)||0;updateStageTotal()"/>
      <button class="btn-remove-stage" onclick="removeStageRow(${i})">✕</button>
    </div>`).join('');
  updateStageTotal();
}

function addStageRow(){
  edStages.push({name:'New Stage', amt:0, hardReceived:false, date:'', status:'pending'});
  renderModalStages();
}

function removeStageRow(i){
  edStages.splice(i,1);
  renderModalStages();
}

function updateStageTotal(){
  const total = edStages.reduce((a,s)=>a+s.amt,0);
  document.getElementById('ed-fee').placeholder = 'Stages total: '+fmtINR(total);
}

function previewFee(){
  const civil = parseFloat(document.getElementById('ed-civil').value)||0;
  const rate  = parseFloat(document.getElementById('ed-rate').value)||5;
  const calc  = Math.round(civil*(rate/100));
  document.getElementById('ed-preview').textContent =
    civil ? `₹${civil.toLocaleString('en-IN')} × ${rate}% = ₹${calc.toLocaleString('en-IN')} → set your rounded total fee above` : 'Enter civil cost and rate to calculate fee.';
  if(civil && !document.getElementById('ed-fee').value) document.getElementById('ed-fee').value = calc;
}

function saveProject(){
  const p = PROJECTS.find(x=>x.id===editingPid);
  p.title  = document.getElementById('ed-title').value.trim() || p.title;
  p.client = document.getElementById('ed-client').value.trim();
  p.civil  = parseFloat(document.getElementById('ed-civil').value)||p.civil;
  p.rate   = parseFloat(document.getElementById('ed-rate').value)||p.rate;
  p.fee    = parseFloat(document.getElementById('ed-fee').value)||p.fee;
  p.scope  = document.getElementById('ed-scope').value.trim() || p.scope;
  p.notes  = document.getElementById('ed-notes').value.trim();
  // merge stage names/amounts preserving status/date from existing
  edStages.forEach((es,i)=>{
    if(i < p.stages.length){
      p.stages[i].name = es.name;
      p.stages[i].amt  = es.amt;
    } else {
      p.stages.push({name:es.name, amt:es.amt, hardReceived:false, date:'', status:'pending'});
    }
  });
  // trim if stages removed
  if(edStages.length < p.stages.length) p.stages = p.stages.slice(0, edStages.length);
  // rebuild stageRemarks to match length
  while(p.stageRemarks.length < p.stages.length) p.stageRemarks.push('');
  p.stageRemarks = p.stageRemarks.slice(0, p.stages.length);

  saveProjects();
  closeEditModal();
  renderAll();
  // re-apply colours after re-render
  PROJECTS.forEach(proj=>applyRowColours(proj.id));
}

function fmtINR(n){
  if(!n&&n!==0) return '—';
  if(n>=10000000) return '₹'+(n/10000000).toFixed(2)+'Cr';
  if(n>=100000)   return '₹'+(n/100000).toFixed(2)+'L';
  return '₹'+Math.round(n).toLocaleString('en-IN');
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }

  const iframe = document.getElementById('i3d-print-frame');

}
